<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">

<style>

body{
 margin:0;
 background:black;
 color:white;
 font-family:'Inter',sans-serif;
 overflow:hidden;
}

#radar{
 position:relative;
 width:100vw;
 height:100vh;
}

.center{
 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
 font-size:40px;
 opacity:0.7;
}

.waypoint{
 position:absolute;
 text-align:center;
 transition:transform 0.1s;
}

.name{
 font-size:22px;
}

.dist{
 font-size:14px;
 opacity:0.8;
}

#start{
 position:absolute;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 background:white;
 color:black;
 border:none;
 padding:12px 20px;
 font-weight:700;
 border-radius:8px;
}

#compass{
 position:absolute;
 top:20px;
 right:20px;
 width:120px;
 height:120px;
 border:2px solid white;
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
}

#compass-inner{
 position:relative;
 width:100%;
 height:100%;
}

.dir{
 position:absolute;
 left:50%;
 transform:translateX(-50%);
}

.n{top:5px}
.s{bottom:5px}
.e{right:5px;left:auto;top:50%;transform:translateY(-50%)}
.o{left:5px;top:50%;transform:translateY(-50%)}

</style>
</head>

<body>

<div id="radar">

<div class="center">▲</div>

<button id="start" onclick="startRadar()">Activar radar</button>

<div id="compass">
 <div id="compass-inner">
  <div class="dir n">N</div>
  <div class="dir s">S</div>
  <div class="dir e">E</div>
  <div class="dir o">O</div>
 </div>
</div>

</div>

<script>

const waypoints=[
{name:"Colegio",lat:40.5089,lon:-3.6792},
];

let userLat=null;
let userLon=null;
let heading=0;
let lastUpdate=0;

const radar=document.getElementById("radar");
const compass=document.getElementById("compass-inner");

waypoints.forEach(w=>{
 const el=document.createElement("div");
 el.className="waypoint";
 el.innerHTML=
  "<div class='name'>▲ "+w.name+"</div>"+
  "<div class='dist'>...</div>";
 w.el=el;
 radar.appendChild(el);
});

function startRadar(){

 document.getElementById("start").style.display="none";

 navigator.geolocation.watchPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;
 });

 window.addEventListener("deviceorientation",handleOrientation);
 window.addEventListener("deviceorientationabsolute",handleOrientation,true);

}

function angleDiff(a,b){
 return (b - a + 540) % 360 - 180;
}

function handleOrientation(e){

 const now=Date.now();
 if(now-lastUpdate<40) return;
 lastUpdate=now;

 let newHeading;

 if(e.webkitCompassHeading!==undefined){
  newHeading=e.webkitCompassHeading;
 }
 else if(e.alpha!==null){
  newHeading=360-e.alpha;
 }
 else{
  return;
 }

 if(heading===0) heading=newHeading;

 const diff=angleDiff(heading,newHeading);

 heading+=diff*0.15;

 compass.style.transform="rotate("+(-heading)+"deg)";

 update();

}

function distance(lat1,lon1,lat2,lon2){

 const R=6371;

 const dLat=(lat2-lat1)*Math.PI/180;
 const dLon=(lon2-lon1)*Math.PI/180;

 const a=
  Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

 const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

 return R*c;

}

function bearing(lat1,lon1,lat2,lon2){

 const y=Math.sin((lon2-lon1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);

 const x=
  Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-
  Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.cos((lon2-lon1)*Math.PI/180);

 return (Math.atan2(y,x)*180/Math.PI+360)%360;

}

function update(){

 if(userLat===null)return;

 waypoints.forEach(w=>{

  const b=bearing(userLat,userLon,w.lat,w.lon);

  let diff=b-heading;

  if(diff>180)diff-=360;
  if(diff<-180)diff+=360;

  let x=window.innerWidth/2+diff*4;

  const d=distance(userLat,userLon,w.lat,w.lon);

  let arrow="▲";

  if(x<0){
   x=10;
   arrow="←";
  }

  if(x>window.innerWidth-80){
   x=window.innerWidth-80;
   arrow="→";
  }

  w.el.style.left=x+"px";
  w.el.style.top="40%";

  w.el.querySelector(".name").innerText=arrow+" "+w.name;

  if(d<1){
   w.el.querySelector(".dist").innerText=(d*1000).toFixed(0)+" m";
  }else{
   w.el.querySelector(".dist").innerText=d.toFixed(2)+" km";
  }

  /* tamaño según distancia */

  let scale;

  if(d<0.1) scale=2.2;
  else if(d<0.3) scale=1.8;
  else if(d<0.7) scale=1.4;
  else if(d<1.5) scale=1.1;
  else scale=0.8;

  w.el.style.transform="scale("+scale+")";

 });

}

</script>

</body>
</html>
